<style>
  :root{--bg:#0f1226;--card:#1a1f3a;--card-h:#222848;--accent:#7c6cff;--accent2:#ff7ab8;--text:#eef0ff;--muted:#9aa0c7;--border:#2b3160;--chip:#2a2f55;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(160deg,#0f1226,#161a35);color:var(--text);min-height:100vh;padding:32px 20px 64px;}
  .wrap{max-width:1080px;margin:0 auto;}
  .eyebrow{color:var(--accent2);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:12px;}
  h1{font-size:34px;margin:6px 0 8px;}
  .sub{color:var(--muted);font-size:15px;max-width:640px;line-height:1.5;}
  .meta{color:var(--muted);font-size:13px;margin-top:10px;}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:26px 0;}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
  .stat .num{font-size:28px;font-weight:800;color:var(--accent);}
  .stat .lbl{color:var(--muted);font-size:13px;margin-top:2px;}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:22px;}
  #search{flex:1;min-width:220px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:10px;font-size:14px;}
  #search::placeholder{color:var(--muted);}
  .filters{display:flex;flex-wrap:wrap;gap:8px;}
  .filter{background:var(--chip);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:999px;cursor:pointer;font-size:13px;transition:.15s;}
  .filter:hover{color:var(--text);}
  .filter.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:.15s;display:flex;flex-direction:column;gap:10px;}
  .card:hover{background:var(--card-h);transform:translateY(-2px);border-color:var(--accent);}
  .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent2);background:rgba(255,122,184,.12);padding:4px 9px;border-radius:6px;white-space:nowrap;}
  .new{font-size:10px;font-weight:700;color:#0f1226;background:#6cf09a;padding:3px 7px;border-radius:5px;}
  .card h3{font-size:17px;line-height:1.3;}
  .when{color:var(--accent);font-size:13px;font-weight:600;}
  .where{color:var(--muted);font-size:13px;}
  .desc{color:var(--text);font-size:14px;line-height:1.5;opacity:.92;}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:8px;gap:10px;}
  .src{color:var(--muted);font-size:12px;}
  a.link{color:var(--accent);font-size:13px;text-decoration:none;font-weight:600;white-space:nowrap;}
  a.link:hover{text-decoration:underline;}
  .empty{color:var(--muted);text-align:center;padding:40px;grid-column:1/-1;}
  footer.page{margin-top:40px;color:var(--muted);font-size:12px;text-align:center;line-height:1.6;}
</style>
</head>
<body>

const MONTHS=["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
function fmtDate(d){if(!d)return"";const p=d.split("-");if(p.length<3)return d;return parseInt(p[2],10)+" "+MONTHS[parseInt(p[1],10)-1]+" "+p[0];}
function isNew(i){if(!i.added_on)return false;const a=new Date(i.added_on),n=new Date(DB.last_updated||Date.now());return (n-a)/86400000<=7;}
const items=(DB.items||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||""));

document.getElementById("search").addEventListener("input",e=>{query=e.target.value.toLowerCase();render();});
function render(){const grid=document.getElementById("grid");const list=items.filter(i=>{const okC=activeCat==="Alla"||i.category===activeCat;const hay=((i.title||"")+" "+(i.summary||"")+" "+(i.location||"")+" "+(i.category||"")).toLowerCase();return okC&&(query===""||hay.includes(query));});
