<script>
const DB = /*__DATA__*/{"topic":"Katolska kyrkans sociala lära","description":"Den katolska kyrkans sociala lära – principerna och temana som vägleder ett rättvist samhälle. Uppdateras varje vecka.","schema_version":1,"last_updated":"2026-06-21","item_count":33,"items":[{"id":"liv-och-vardighet","title":"Människans liv och värdighet","category":"Princip","date":"2026-06-07","location":"","summary":"Människolivet är heligt och personens värdighet är grunden för en moralisk samhällssyn. Detta är grunden för alla övriga principer.","source":"USCCB","url":"https://www.usccb.org/beliefs-and-teachings/what-we-believe/catholic-social-teaching/seven-themes-of-catholic-social-teaching","added_on":"2026-06-07","collected_week":"2026-W23"},{"id":"familj-gemenskap-delaktighet","title":"Kallelse till familj, gemenskap och delaktighet","category":"Princip","date":"2026-06-07","location":"","summary":"Människan är inte bara helig utan också social. Hur vi organiserar samhället påverkar direkt människans värdighet och möjlighet att växa i gemenskap.","source":"USCCB","url":"https://www.usccb.org/beliefs-and-teachings/what-we-believe/catholic-social-teaching/seven-themes-of-catholic-social-teaching","added_on":"2026-06-07","collected_week":"2026-W23"},{"id":"rattigheter-skyldigheter","title":"Rättigheter och skyldigheter","category":"Princip","date":"2026-06-07","location":"","summary":"Människans värdighet skyddas när grundläggande rättigheter värnas och skyldigheter uppfylls. Var och en har rätt till liv och det som krävs för ett människovärdigt liv.","source":"USCCB","url":"https://www.usccb.org/beliefs-and-teachings/what-we-believe/catholic-social-teaching/seven-themes-of-catholic-social-teaching","added_on":"2026-06-07","collected_week":"2026-W23"},{"id":"foretradesvalet-for-de-fattiga","title":"Företrädesvalet för de fattiga och sårbara","category":"Princip","date":"2026-06-07","location":"","summary":"Ett samhälles moraliska prövning är hur det behandlar sina mest sårbara medlemmar. De fattiga har det mest brådskande moraliska kravet på samvetet.","source":"USCCB","url":"https://www.usccb.org/beliefs-and-teachings/what-we-believe/catholic-social-teaching/seven-themes-of-catholic-social-teaching","added_on":"2026-06-07","collected_week":"2026-W23"},{"id":"arbetets-vardighet","title":"Arbetets värdighet och arbetarnas rättigheter","category":"Princip","date":"2026-06-07","location":"","summary":"Människor har rätt till anständigt och produktivt arbete, rättvis lön, privat egendom och ekonomiskt initiativ. Ekonomin ska tjäna människan, inte tvärtom.","source":"USCCB","url":"https://www.usccb.org/beliefs-and-teachings/what-we-believe/catholic-social-teaching/seven-themes-of-catholic-social-teaching","added_on":"2026-06-07","collected_week":"2026-W23"},{"id":"solidaritet","title":"Solidaritet","category":"Princip","date":"2026-06-07","location":"","summary":"Solidaritet är mer än en vag medkänsla – det är en fast och uthållig beslutsamhet att verka för det gemensamma bästa, eftersom vi alla är ansvariga för alla.","source":"USCCB","url":"https://www.usccb.org/beliefs-and-teachings/what-we-believe/catholic-social-teaching/seven-themes-of-catholic-social-teaching","added_on":"2026-06-07","collected_week":"2026-W23"},{"id":"omsorg-om-skapelsen","title":"Omsorg om skapelsen","category":"Princip","date":"2026-06-07","location":"","summary":"Att vårda Guds skapelse är ett krav i tron. Vi är kallade att vara goda förvaltare av miljön och naturresurserna.","source":"USCCB","url":"https://www.usccb.org/beliefs-and-teachings/what-we-believe/catholic-social-teaching/seven-themes-of-catholic-social-teaching","added_on":"2026-06-07","collected_week":"2026-W23"},{"id":"rerum-novarum","title":"Rerum Novarum (1891)","category":"Encyklika","date":"1891-01-01","location":"","summary":"Leo XIII:s encyklika om arbete och kapital lade grunden för den moderna katolska sociala läran. Den försvarar arbetarnas rättigheter, rättvis lön och privat egendom som svar på industrialiseringens orättvisor.","source":"Vatican / Britannica","url":"https://www.vatican.va/content/leo-xiii/en/encyclicals/documents/hf_l-xiii_enc_15051891_rerum-novarum.html","added_on":"2026-06-08","collected_week":"2026-W24"},{"id":"quadragesimo-anno","title":"Quadragesimo Anno (1931)","category":"Encyklika","date":"1931-01-01","location":"","summary":"Pius XI:s encyklika på 40-årsdagen av Rerum Novarum. Den introducerade subsidiaritetsprincipen och kritiserade både obegränsad kapitalism och statssocialism.","source":"Vatican","url":"https://www.vatican.va/content/pius-xi/en/encyclicals/documents/hf_p-xi_enc_19310515_quadragesimo-anno.html","added_on":"2026-06-08","collected_week":"2026-W24"},{"id":"pacem-in-terris","title":"Pacem in Terris (1963)","category":"Encyklika","date":"1963-01-01","location":"","summary":"Johannes XXIII:s encyklika om fred grundad på sanning, rättvisa, kärlek och frihet. Den var den första encyklikan riktad till 'alla människor av god vilja' och betonade mänskliga rättigheter.","source":"Vatican","url":"https://www.vatican.va/content/john-xxiii/en/encyclicals/documents/hf_j-xxiii_enc_11041963_pacem.html","added_on":"2026-06-08","collected_week":"2026-W24"},{"id":"populorum-progressio","title":"Populorum Progressio (1967)","category":"Encyklika","date":"1967-01-01","location":"","summary":"Paulus VI:s encyklika om folkens utveckling. Den betonar att 'utveckling är fredens nya namn' och kräver global solidaritet mellan rika och fattiga nationer.","source":"Vatican","url":"https://www.vatican.va/content/paul-vi/en/encyclicals/documents/hf_p-vi_enc_26031967_populorum.html","added_on":"2026-06-08","collected_week":"2026-W24"},{"id":"centesimus-annus","title":"Centesimus Annus (1991)","category":"Encyklika","date":"1991-01-01","location":"","summary":"Johannes Paulus II:s encyklika på 100-årsdagen av Rerum Novarum. Den utvärderar marknadsekonomin efter kommunismens fall och bekräftar människans värdighet som centrum för ekonomin.","source":"Vatican","url":"https://www.vatican.va/content/john-paul-ii/en/encyclicals/documents/hf_jp-ii_enc_01051991_centesimus-annus.html","added_on":"2026-06-08","collected_week":"2026-W24"},{"id":"laudato-si","title":"Laudato Si' (2015)","category":"Encyklika","date":"2015-01-01","location":"","summary":"Franciskus encyklika om omsorgen om vårt gemensamma hem. Den behandlar miljön som en brådskande moralisk fråga och kopplar samman ekologi och social rättvisa i en 'integrerad ekologi'.","source":"Vatican","url":"https://www.vatican.va/content/francesco/en/encyclicals/documents/papa-francesco_20150524_enciclica-laudato-si.html","added_on":"2026-06-08","collected_week":"2026-W24"},{"id":"fratelli-tutti","title":"Fratelli Tutti (2020)","category":"Encyklika","date":"2020-01-01","location":"","summary":"Franciskus encyklika om broderskap och social vänskap. Den uppmanar till universellt syskonskap över gränser och kritiserar en 'slit-och-släng-kultur' som utesluter de svaga.","source":"Vatican","url":"https://www.vatican.va/content/francesco/en/encyclicals/documents/papa-francesco_20201003_enciclica-fratelli-tutti.html","added_on":"2026-06-08","collected_week":"2026-W24"},{"id":"subsidiaritet","title":"Subsidiaritet","category":"Begrepp","date":"2026-06-08","location":"","summary":"Principen att beslut bör fattas på lägsta möjliga nivå nära de berörda. Större institutioner ska inte överta uppgifter som mindre eller lokala gemenskaper kan sköta, men ska stödja dem vid behov.","source":"USCCB","url":"https://www.usccb.org/resources/Subsidiarity.pdf","added_on":"2026-06-08","collected_week":"2026-W24"},{"id":"det-gemensamma-basta","title":"Det gemensamma bästa","category":"Begrepp","date":"2026-06-08","location":"","summary":"Summan av de samhällsvillkor som låter både grupper och individer nå sin fulla utveckling. Ett av den sociala lärans fyra grundprinciper jämte människans värdighet, solidaritet och subsidiaritet.","source":"Compendium of the Social Doctrine of the Church","url":"https://www.vatican.va/roman_curia/pontifical_councils/justpeace/documents/rc_pc_justpeace_doc_20060526_compendio-dott-soc_en.html","added_on":"2026-06-08","collected_week":"2026-W24"},{"id":"universell-bestammelse-jordens-goda","title":"Jordens goda – universell bestämmelse","category":"Begrepp","date":"2026-06-08","location":"","summary":"Principen att jordens resurser är avsedda för alla människor. Rätten till privat egendom är inte absolut utan underordnad det gemensamma bruket av skapelsens goda.","source":"Compendium of the Social Doctrine of the Church","url":"https://www.vatican.va/roman_curia/pontifical_councils/justpeace/documents/rc_pc_justpeace_doc_20060526_compendio-dott-soc_en.html","added_on":"2026-06-08","collected_week":"2026-W24"},{"id":"magnifica-humanitas-2026","title":"Magnifica Humanitas – Leo XIV om AI (2026)","category":"Aktuellt","date":"2026-05-25","location":"","summary":"Leo XIV:s första encyklika om att värna människan i den artificiella intelligensens tid. Den varnar för digital ojämlikhet och koncentrerad teknikmakt och kallar AI ett växande socialt rättvisekrav.","source":"CNN / National Catholic Register","url":"https://www.cnn.com/2026/05/25/europe/pope-leo-ai-encyclical-magnifica-humanitas-intl","added_on":"2026-06-08","collected_week":"2026-W24"},{"id":"mater-et-magistra","title":"Mater et Magistra (1961)","category":"Encyklika","date":"1961-01-01","location":"","summary":"Johannes XXIII:s encyklika om kristendomen och de sociala framstegen. Den uppdaterar den sociala läran för efterkrigstiden och betonar samhällelig solidaritet, ett rättvist förhållande mellan rika och fattiga länder samt arbetarnas delaktighet.","source":"Vatican","url":"https://www.vatican.va/content/john-xxiii/en/encyclicals/documents/hf_j-xxiii_enc_15051961_mater.html","added_on":"2026-06-15","collected_week":"2026-W25"},{"id":"gaudium-et-spes","title":"Gaudium et Spes (1965)","category":"Encyklika","date":"1965-01-01","location":"","summary":"Andra Vatikankonciliets pastoralkonstitution om kyrkan i den moderna världen. Den formulerar synen på människans värdighet, det gemensamma bästa och kyrkans roll i samhällsfrågor och blev en grundsten för den sociala läran.","source":"Vatican","url":"https://www.vatican.va/archive/hist_councils/ii_vatican_council/documents/vat-ii_const_19651207_gaudium-et-spes_en.html","added_on":"2026-06-15","collected_week":"2026-W25"},{"id":"laborem-exercens","title":"Laborem Exercens (1981)","category":"Encyklika","date":"1981-01-01","location":"","summary":"Johannes Paulus II:s encyklika om det mänskliga arbetet. Den hävdar arbetets företräde framför kapitalet och att arbetet har sitt värde i att det utförs av en person, inte i vad som produceras.","source":"Vatican","url":"https://www.vatican.va/content/john-paul-ii/en/encyclicals/documents/hf_jp-ii_enc_14091981_laborem-exercens.html","added_on":"2026-06-15","collected_week":"2026-W25"},{"id":"sollicitudo-rei-socialis","title":"Sollicitudo Rei Socialis (1987)","category":"Encyklika","date":"1987-01-01","location":"","summary":"Johannes Paulus II:s encyklika om social omsorg på 20-årsdagen av Populorum Progressio. Den fördjupar begreppet äkta utveckling och introducerar 'syndens strukturer' som hindrar det gemensamma bästa.","source":"Vatican","url":"https://www.vatican.va/content/john-paul-ii/en/encyclicals/documents/hf_jp-ii_enc_30121987_sollicitudo-rei-socialis.html","added_on":"2026-06-15","collected_week":"2026-W25"},{"id":"caritas-in-veritate","title":"Caritas in Veritate (2009)","category":"Encyklika","date":"2009-01-01","location":"","summary":"Benedikt XVI:s encyklika om integral mänsklig utveckling i kärlek och sanning. Den knyter samman kärlek (caritas) och sanning som grund för rättvisa och det gemensamma bästa i en globaliserad ekonomi.","source":"Vatican","url":"https://www.vatican.va/content/benedict-xvi/en/encyclicals/documents/hf_ben-xvi_enc_20090629_caritas-in-veritate.html","added_on":"2026-06-15","collected_week":"2026-W25"},{"id":"integral-manniskoutveckling","title":"Integral mänsklig utveckling","category":"Begrepp","date":"2026-06-15","location":"","summary":"Principen att äkta utveckling omfattar hela människan och alla människor – inte bara ekonomisk tillväxt utan även andliga, kulturella och sociala dimensioner. Centralt i Populorum Progressio och Caritas in Veritate.","source":"Compendium of the Social Doctrine of the Church","url":"https://www.vatican.va/roman_curia/pontifical_councils/justpeace/documents/rc_pc_justpeace_doc_20060526_compendio-dott-soc_en.html","added_on":"2026-06-15","collected_week":"2026-W25"},{"id":"syndens-strukturer","title":"Syndens strukturer","category":"Begrepp","date":"2026-06-15","location":"","summary":"Begreppet att enskilda synder kan förfestas i orättvisa samhälleliga, ekonomiska och politiska strukturer som hindrar det gemensamma bästa. Formulerat av Johannes Paulus II i Sollicitudo Rei Socialis.","source":"Vatican / Sollicitudo Rei Socialis","url":"https://www.vatican.va/content/john-paul-ii/en/encyclicals/documents/hf_jp-ii_enc_30121987_sollicitudo-rei-socialis.html","added_on":"2026-06-15","collected_week":"2026-W25"},{"id":"leo-xiv-nyarsbudskap-2026","title":"Leo XIV:s nyårsbudskap 2026 om fred","category":"Aktuellt","date":"2026-01-01","location":"","summary":"I sitt nyårsbudskap på Världsdagen för fred uppmanade Leo XIV världen att avvisa våld och bygga fred grundad på rättvisa och mänsklig värdighet, i linje med kyrkans sociala lära.","source":"Vatican News / AOL","url":"https://www.vaticannews.va/en/pope/news/2026-01/pope-leo-xiv-centesimus-annus-pro-pontefice-message.html","added_on":"2026-06-15","collected_week":"2026-W25"},{"id":"octogesima-adveniens","title":"Octogesima Adveniens (1971)","category":"Encyklika","date":"1971-01-01","location":"","summary":"Paulus VI:s apostoliska brev på 80-årsdagen av Rerum Novarum, riktat till kardinal Roy. Det uppmanar kristna att läsa 'tidens tecken' och aktivt delta i social och politisk reform mot orättvisor.","source":"Vatican / Archdiocese of Santa Fe","url":"https://www.vatican.va/content/paul-vi/en/apost_letters/documents/hf_p-vi_apl_19710514_octogesima-adveniens.html","added_on":"2026-06-21","collected_week":"2026-W25"},{"id":"justitia-in-mundo","title":"Justitia in Mundo (1971)","category":"Encyklika","date":"1971-01-01","location":"","summary":"Biskopssynodens dokument 'Rättvisa i världen'. Det förklarar att handling för rättvisa och omvandling av världen är en konstitutiv del av evangeliets förkunnelse och pekar på orättvisans strukturella rötter.","source":"Synod of Bishops 1971 / CCT Twin Cities","url":"https://www.cctwincities.org/education-advocacy/catholic-social-teaching/major-documents/justicia-in-mundo/","added_on":"2026-06-21","collected_week":"2026-W25"},{"id":"evangelii-gaudium","title":"Evangelii Gaudium (2013)","category":"Encyklika","date":"2013-01-01","location":"","summary":"Franciskus apostoliska maning om evangeliets glädje. Den kritiserar 'utestängningens och ojämlikhetens ekonomi' och en 'slit-och-släng-kultur', och betonar de fattigas plats i kyrkans uppdrag.","source":"Vatican","url":"https://www.vatican.va/content/francesco/en/apost_exhortations/documents/papa-francesco_esortazione-ap_20131124_evangelii-gaudium.html","added_on":"2026-06-21","collected_week":"2026-W25"},{"id":"deltagande","title":"Deltagande","category":"Begrepp","date":"2026-06-21","location":"","summary":"Principen att varje människa, enskilt eller i gemenskap, ska bidra till samhällets kulturella, ekonomiska, politiska och sociala liv. Deltagande följer av subsidiariteten och av människans värdighet.","source":"Compendium of the Social Doctrine of the Church","url":"https://www.vatican.va/roman_curia/pontifical_councils/justpeace/documents/rc_pc_justpeace_doc_20060526_compendio-dott-soc_en.html","added_on":"2026-06-21","collected_week":"2026-W25"},{"id":"social-rattvisa-begrepp","title":"Social rättvisa","category":"Begrepp","date":"2026-06-21","location":"","summary":"Den dygd och det samhälleliga krav som riktar handlandet mot det gemensamma bästa och ger var och en det som tillkommer dem. Den knyter samman människans värdighet, solidaritet och jordens goda för alla.","source":"Compendium of the Social Doctrine of the Church","url":"https://www.vatican.va/roman_curia/pontifical_councils/justpeace/documents/rc_pc_justpeace_doc_20060526_compendio-dott-soc_en.html","added_on":"2026-06-21","collected_week":"2026-W25"},{"id":"leo-xiv-migranter-2026","title":"Leo XIV: 'Människovärdet har inget pass' (2026)","category":"Aktuellt","date":"2026-06-11","location":"","summary":"I ett känslosamt upprop för migranter sade Leo XIV: 'Människovärdet har inget pass och förlorar inte sitt värde när man korsar en gräns.' Uttalandet knyter migrationsfrågan till kyrkans sociala lära om människans värdighet.","source":"Religion News Service","url":"https://religionnews.com/2026/06/11/pope-leo-xiv-makes-heartfelt-appeal-for-migrants-human-dignity-has-no-passport/","added_on":"2026-06-21","collected_week":"2026-W25"},{"id":"leo-xiv-spanien-2026","title":"Leo XIV:s tal till Spaniens parlament (2026)","category":"Aktuellt","date":"2026-06-08","location":"","summary":"I ett tal till spanska lagstiftare efterlyste Leo XIV en 'moralisk förnyelse' i det offentliga livet och ett 'tvåfaldigt krav på social rättvisa': trygga och lagliga vägar för migranter samt rätten att stanna kvar i sitt eget land.","source":"PBS / NPR / OSV News","url":"https://www.pbs.org/newshour/world/popes-historic-speech-to-spains-parliament-demands-respect-for-migrants-gets-7-minute-ovation","added_on":"2026-06-21","collected_week":"2026-W25"}]}/*__END_DATA__*/;

function fmtDate(d){if(!d)return"";const p=d.split("-");if(p.length<3)return d;return parseInt(p[2],10)+" "+MONTHS[parseInt(p[1],10)-1]+" "+p[0];}
function isNew(i){if(!i.added_on)return false;const a=new Date(i.added_on),n=new Date(DB.last_updated||Date.now());return (n-a)/86400000<=7;}
const items=(DB.items||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||""));
let activeCat="Alla",query="";
document.getElementById("desc").textContent=DB.description||"";
document.getElementById("updated").textContent="Senast uppdaterad: "+fmtDate(DB.last_updated)+" · "+items.length+" poster";
const cats={},srcs={};
items.forEach(i=>{cats[i.category]=(cats[i.category]||0)+1;if(i.source)srcs[i.source]=1;});
const newCount=items.filter(isNew).length;
document.getElementById("stats").innerHTML=`
  <div class="stat"><div class="num">${items.length}</div><div class="lbl">Totalt antal poster</div></div>
  <div class="stat"><div class="num">${newCount}</div><div class="lbl">Nya denna vecka</div></div>
  <div class="stat"><div class="num">${Object.keys(cats).length}</div><div class="lbl">Kategorier</div></div>
  <div class="stat"><div class="num">${Object.keys(srcs).length}</div><div class="lbl">Källor</div></div>`;
const fEl=document.getElementById("filters");
["Alla",...Object.keys(cats).sort()].forEach(c=>{const b=document.createElement("button");b.className="filter"+(c==="Alla"?" active":"");b.textContent=c==="Alla"?"Alla":c+" ("+cats[c]+")";b.onclick=()=>{activeCat=c;[...fEl.children].forEach(x=>x.classList.remove("active"));b.classList.add("active");render();};fEl.appendChild(b);});
document.getElementById("search").addEventListener("input",e=>{query=e.target.value.toLowerCase();render();});
function render(){const grid=document.getElementById("grid");const list=items.filter(i=>{const okC=activeCat==="Alla"||i.category===activeCat;const hay=((i.title||"")+" "+(i.summary||"")+" "+(i.location||"")+" "+(i.category||"")).toLowerCase();return okC&&(query===""||hay.includes(query));});
if(!list.length){grid.innerHTML='<div class="empty">Inga poster matchar din sökning.</div>';return;}
grid.innerHTML=list.map(i=>`<article class="card"><div class="top"><span class="cat">${i.category||""}</span>${isNew(i)?'<span class="new">NY</span>':''}</div><h3>${i.title||""}</h3><div class="when">📅 ${fmtDate(i.date)}</div>${i.location?`<div class="where">📍 ${i.location}</div>`:''}<div class="desc">${i.summary||""}</div><div class="foot"><span class="src">${i.source||""}</span>${i.url?`<a class="link" href="${i.url}" target="_blank" rel="noopener">Läs mer →</a>`:''}</div></article>`).join("");}
render();
</script>
